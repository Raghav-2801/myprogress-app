services:
  # Frontend Service
  - type: web
    name: myprogress-frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run preview
    root: ./
    envVars:
      - key: VITE_API_URL
        value: https://myprogress-api.onrender.com/api
      - key: VITE_BASE_PATH
        value: /myprogress/
      - key: NODE_VERSION
        value: 18.17.0

  # API Service
  - type: web
    name: myprogress-api
    plan: free
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker backend.app.main:app --bind 0.0.0.0:$PORT
    root: ./
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        fromDatabase:
          name: progress_tracker_db
          property: secret_key
      - key: DATABASE_URL
        fromDatabase:
          name: progress_tracker_db
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://kapilraghav.info", "https://www.kapilraghav.info", "https://kapilraghav.info/myprogress"]'
      - key: FRONTEND_URL
        value: https://kapilraghav.info/myprogress
      - key: GITHUB_USERNAME
        value: Raghav-2801
      - key: ADMIN_USERNAME
        value: kapil

databases:
  - name: progress_tracker_db
    plan: free
    databaseName: progress_tracker
